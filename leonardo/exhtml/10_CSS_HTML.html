<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ex 10</title>
<link rel="stylesheet" href="CSS/ex10.css">
</head>

<body>

<div class="container">

    <div class="areaform">
        <h1>EVENT REGISTRATION FORM</h1>

        <form>
            <div class="row">
                <label>Name</label>
                    <div class="namegr">
                    <input type="text" placeholder="First Name">
                    <input type="text" placeholder="Last Name">
                </div>
            </div>

            <div class="row">
                <label>Company</label>   
                <input type="text">
            </div>

            <div class="row">
                <label>Email</label>
                    <input type="email">
            </div>

            <div class="row">
                <label>Phone</label>
                <div class="phonegr">
                    <input type="text" placeholder="+55">
                    <input type="text" placeholder="####">
                </div>
            </div>

            <div class="row">
                <label>Subject</label>
                <select class="full">
                    <option>Chose option</option>
                    <option>ssasasfaf</option>
                    <option>adwvcvasdvds</option>
                </select>
            </div>

            <div class="row">
                <label>Are you an existing customer?</label>

                <div class="opcoes">
                    <label>
                        <input type="radio" name="customer" value="yes"> Yes
                    </label>

                    <label>
                        <input type="radio" name="customer" value="no"> No
                    </label>
                </div>
            </div>

            <div class="row">
                <button type="submit">REGISTER</button>
            </div>

        </form>
    </div>

</div>


</body>
</html>
