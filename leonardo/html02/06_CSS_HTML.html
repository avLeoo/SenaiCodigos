<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Contact Form</title>
<link rel="stylesheet" href="CSS/estilo06.css">
</head>

<body>

<div class="container">

    <div class="form-area">
        <h1>Contact form</h1>
        <p>Please fill in your information and we'll be sending your order in no time.</p>

        <form>
            <div class="row">
                <label>Your Name</label>
                <div class="name-group">
                    <input type="text" placeholder="First Name">
                    <input type="text" placeholder="Last Name">
                </div>
            </div>

            <div class="row">
                <label>Your Email</label>
                <input class="full" type="email" placeholder="Ex:hello@contact.com">
            </div>

            <div class="row">
                <label>Phone</label>
                <div class="phone-group">
                    <input type="text" placeholder="+55">
                    <input type="text" placeholder="####">
                    <input type="text" placeholder="####">
                </div>
            </div>

            <div class="row">
                <label>Message Subject *</label>
                <select class="full">
                    <option>Other</option>
                    <option>ssasasfaf</option>
                    <option>adwvcvasdvds</option>
                </select>
            </div>

            <div class="row">
                <label>Message *</label>
                <textarea></textarea>
            </div>

            <button type="submit">SUBMIT FORM</button>

        </form>
    </div>

</div>

</body>
</html>
