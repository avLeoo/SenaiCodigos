<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML - Atividade Formulario</title>
</head>
<body>
    
    <h3>Envie uma mensagem preenchendo o<br>formulário abaixo</h3>

    <form action="" method="">
        Seu Nome <br />
        <input type="text" name="Nome" placeholder="Seu nome"><br /><br />

        Seu Telefone <br />
        <input type="text" name="Telefone" placeholder="(XX)XXXX-XXXX"><br /><br />

        Seu E-Mail <br />
        <input type="text" name="Email" placeholder="xxxxxx@mail.com"><br /><br />

        Deseja receber novidades? <br />
        <input type="radio" name="novidade" />Sim
        <input type="radio" name="novidade" />Não <br /><br />

        Aonde nos encontrou<br />
        Exemplo de Checkbox <br />
        <input type="checkbox" name="opc1" />E-Mail
        <input type="checkbox" name="opc2" />Google
        <input type="checkbox" name="opc3" />YouTube <br /><br />

        Selecione uma opção na lista: <br />
        <select>
            <option>Selecione uma opção</option>
            <option value="Brasil">Brasil - BR</option>
            <option value="Argentina">Argentina - AG</option>
            <option value="Chile">Chile - CH</option>
        </select> <br /><br />

        Sua mensagem <br />
        <textarea name="opiniao" placeholder="Deixe aqui sua opiniao..." rows="5"></textarea><br /><br />

        <input type="submit" value="Enviar" style="margin-left: 50px";>
    </form>

</body>
</html>
