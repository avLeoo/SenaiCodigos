<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML - Trabalhando com Formulários</title>
</head>
<body>
    
    <!---
    A TAG FORM é utilizada para definir a estrutura de envio de dados
    através dos elementos de entrada e seleção de dados.
    --->

    <form action="" method="">
        <input type="text" name="Nome" placeholder="Leonardo Vieira"/> Nome <br /><br />
        <input type="text" name="Fone" placeholder="(XX)XXXX-XXXX"/> Fone <br /><br /> 
        <input type="text" name="Email" placeholder="xxxxxx@mail.com"/> E-Mail <br /><br />s
        <textarea name="opiniao" placeholder="Deixe sua opinião..." rows="6"></textarea> <br />
        <input type="submit" value="Enviar"/>
    </form>
    
</body>
</html>
