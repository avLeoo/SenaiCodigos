<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML - Ativiade</title>
</head>
<body>
    
    <form>

    <h4>Dados pessoais</h4> <br />

    Nome: <input type="text" name="Nome" /> <br />
    Idade: <input type="text" name="Idade" /> <br /><br />

    <h4>Dados profissionais</h4> <br />

    Escolaridade:         
    <select>
        <option value="Ensino medio">Ensino Médio</option>
        <option value="Ensino fundamental">Ensino Fundamental</option>
        <option value="Bacharel">Bacharel</option>
    </select> <br /><br />

    Area de atuação:
    <input type="radio" name="area">Gerência
    <input type="radio" name="area">Financeiro
    <input type="radio" name="area">Recepção <br /><br />

    Como podemos contatar você? <br />
    <input type="checkbox" name="email">E-Mail <br />
    <input type="checkbox" name="telefone">Telefone <br />
    <input type="checkbox" name="whatsapp">Whatsapp <br />
    <input type="checkbox" name="dicas">Desejo receber noticias e dicas via e-mail <br /><br />

    <input type="submit" value="Enviar">
    <input type="reset" value="Reset">

    </form>
    
</body>
</html>
