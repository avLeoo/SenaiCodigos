<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML - Ativiade 6</title>
</head>
<body>
    
    <form>

    <h3>Formulário</h3>
    <p>Dados pessoais</p>
    
    Nome: 
    <input type="text" name="nome"><br />

    Endereço: 
    <input type="text" name="endereco"><br />

    Cidade: 
    <input type="text" name="cidade"><br />

    Estado: 
    <select>
        <option value="sao paulo">São Paulo</option>
        <option value="maranhao">Maranhão</option>
        <option value="recife">Recife</option>
        <option value="amazonas">Amazonas</option>
    </select><br /><br />

    <p>Dados profissionais</p>
    <input type="radio" name="cargo">Gerência
    <input type="radio" name="cargo">Financeiro
    <input type="radio" name="cargo">Recepção
    <input type="radio" name="cargo">Administrativo
    <input type="radio" name="cargo">Jurídico <br /><br />

    Área de interesse <br />
    <input type="checkbox" name="op1">Computação
    <input type="checkbox" name="op2">Biologia
    <input type="checkbox" name="op3">Meio Ambiente
    <input type="checkbox" name="op4">Engenharia
    <input type="checkbox" name="op5">História <br /><br />

    Mini-curriculo:
     <textarea name="opiniao" rows="5"></textarea><br /><br />

    </form>

</body>
</html>
