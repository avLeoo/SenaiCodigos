        <input id="conf-password" type="password" placeholder="Repeat your password">

        <div class="agree">

                I agree alll statements in <span>Terms of service</span>
            </label>
        </div>

        </label>

        <div class="already">
            <label for="login">

            </label>
        </div>

        </div>


    </form>

</div>
